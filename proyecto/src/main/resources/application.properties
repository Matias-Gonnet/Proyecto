spring.application.name=proyecto

# Cambia 'nombre_de_tu_bd' por el nombre de la base de datos que creaste en MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/proyecto

# La contraseña que elegiste cuando instalaste MySQL
spring.datasource.username=${UBD}
spring.datasource.password=${CBD}

spring.security.user.name=admin
spring.security.user.password=1234

# Driver de conexión
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración extra para que Hibernate cree las tablas por ti
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cambia el puerto del servidor para poder conectar
server.port=8081

# Desactiva la conexion por Hibernate
spring.jpa.open-in-view=false